<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="900" viewBox="0 0 1920 900" role="img"
    aria-label="Intelligent Systems Laboratory hero background">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f2a4d" />
            <stop offset="100%" stop-color="#1d4f7f" />
        </linearGradient>
        <pattern id="grid" width="90" height="90" patternUnits="userSpaceOnUse">
            <path d="M 90 0 L 0 0 0 90" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
        </pattern>
    </defs>

    <rect width="1920" height="900" fill="url(#bg)" />
    <rect width="1920" height="900" fill="url(#grid)" />

    <g stroke="#cfe8ff" stroke-opacity="0.28" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M 120 680 C 420 520, 760 760, 1120 600 S 1600 540, 1820 620" />
        <path d="M 100 470 C 430 340, 760 560, 1120 430 S 1560 350, 1820 430" />
    </g>

    <g fill="#e8f4ff" opacity="0.5">
        <circle cx="420" cy="525" r="4" />
        <circle cx="760" cy="575" r="4" />
        <circle cx="1090" cy="500" r="4" />
        <circle cx="1430" cy="545" r="4" />
    </g>
</svg>